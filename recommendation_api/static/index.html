<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leftover to Makeover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <p class="eyebrow">Recipe feed</p>
      <h1>Leftover to Makeover</h1>
      <p class="lede">
        List what you have in your kitchen as a list of ingredients, <strong>one ingredient per line</strong> is easiest.
        We rank recipes by overlap with your list.
      </p>
    </header>

    <section class="panel">
      <form id="search-form" class="form">
        <label class="field">
          <span>Ingredients you have <span class="hint">(one per line)</span></span>
          <textarea
            id="ingredients"
            name="ingredients"
            rows="8"
            placeholder="chicken breast&#10;garlic&#10;olive oil&#10;tomato"
            required
          ></textarea>
          <span class="field-hint">Each line is one item. You can also use a single line with commas if you prefer.</span>
        </label>
        <button type="submit" class="btn" id="submit-btn">Find recipes</button>
      </form>
      <p id="status" class="status" aria-live="polite"></p>
    </section>

    <section class="results-wrap">
      <h2 class="results-title">Recipe feed</h2>
      <p id="recent-status" class="status" aria-live="polite"></p>
      <p id="parsed" class="parsed hidden"></p>
      <ul id="results" class="feed"></ul>
      <button type="button" class="btn hidden" id="load-more-btn">Load 10 more</button>
    </section>

    <footer class="foot">
      <small>Demo uses local JSON. Point <code>RECIPES_DATA_PATH</code> at your processed dataset for production.</small>
    </footer>
  </div>
  <script src="/assets/app.js"></script>
</body>
</html>
